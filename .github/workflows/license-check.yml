name: License Check

on:
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  license-check:
    name: License Check
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install license-checker
        run: npm install -g license-checker

      - name: Check licenses
        run: |
          DISALLOW="GPL-2.0;GPL-3.0;LGPL-2.0;LGPL-3.0;AGPL-3.0;SSPL-1.0;CDDL-1.0;EPL-1.0"
          FAIL_ON=$(echo "$DISALLOW" | tr ';' ' ' | xargs -n1 echo "--failOn" | tr '\n' ' ')

          echo "## License Check Results" >> "$GITHUB_STEP_SUMMARY"

          license-checker --production --summary $FAIL_ON | tee license-summary.txt

          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat license-summary.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload license report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: license-report
          path: license-summary.txt
          retention-days: 30
