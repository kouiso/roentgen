name: License Check

on:
  pull_request:
    paths:
      - "package.json"
      - "pnpm-lock.yaml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  license-check:
    name: License Check
    runs-on: ${{ vars.RUNNER_LINUX }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install license-checker
        run: pnpm add -g license-checker

      - name: Check licenses
        run: |
          DISALLOW="GPL-2.0;GPL-3.0;LGPL-2.0;LGPL-3.0;AGPL-3.0;SSPL-1.0;CDDL-1.0;EPL-1.0"
          IFS=";" read -ra DISALLOWED_LICENSES <<< "$DISALLOW"
          FAIL_ON=()
          for license in "${DISALLOWED_LICENSES[@]}"; do
            FAIL_ON+=(--failOn "$license")
          done

          echo "## License Check Results" >> "$GITHUB_STEP_SUMMARY"

          license-checker --production --summary "${FAIL_ON[@]}" | tee license-summary.txt

          {
            echo '```'
            cat license-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload license report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: license-summary.txt
          retention-days: 30
