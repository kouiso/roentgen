name: AI Rules Drift Check

on:
  pull_request:
    paths:
      - 'AGENTS.md'
      - '.gemini/styleguide.md'
      - '.github/copilot-instructions.md'
      - 'scripts/sync-ai-rules.sh'

jobs:
  drift-check:
    name: Bridge files in sync with AGENTS.md
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Check bridge files are in sync
        run: |
          bash scripts/sync-ai-rules.sh
          git diff --exit-code .gemini/styleguide.md .github/copilot-instructions.md || {
            echo "DRIFT DETECTED: bridge files are out of sync with AGENTS.md. Fix: run bash scripts/sync-ai-rules.sh and commit"
            exit 1
          }
