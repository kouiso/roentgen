name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  quality-gates:
    name: Quality gates
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify headless gates
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Renderer headless E2E
        run: pnpm test:e2e -- --project=renderer

  build-mac:
    name: Build (macOS)
    needs: quality-gates
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Package (dmg)
        run: pnpm dist --mac --publish never

      - name: Generate checksums
        run: node scripts/generate-release-checksums.mjs --output "release/SHA256SUMS-macos.txt"

      - name: Publish artifacts and checksums
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          fail_on_unmatched_files: true
          files: |
            release/*.dmg
            release/*.dmg.blockmap
            release/latest*.yml
            release/SHA256SUMS-macos.txt

  build-win:
    name: Build (Windows)
    needs: quality-gates
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Package (nsis)
        run: pnpm dist --win --publish never

      - name: Generate checksums
        run: node scripts/generate-release-checksums.mjs --output "release/SHA256SUMS-windows.txt"

      - name: Publish artifacts and checksums
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          fail_on_unmatched_files: true
          files: |
            release/*.exe
            release/*.exe.blockmap
            release/latest*.yml
            release/SHA256SUMS-windows.txt

  build-linux:
    name: Build (Linux)
    needs: quality-gates
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify headless gates
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Renderer headless E2E
        run: pnpm test:e2e -- --project=renderer

      - name: Build
        run: pnpm build

      - name: Package (AppImage)
        run: pnpm dist --linux --publish never

      - name: Generate checksums
        run: |
          pnpm release:checksums
          cp release/SHA256SUMS.txt release/SHA256SUMS-linux.txt

      - name: Release gate
        run: pnpm release:gate

      - name: Publish artifacts and checksums
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          fail_on_unmatched_files: true
          files: |
            release/*.AppImage
            release/*.AppImage.blockmap
            release/latest-linux.yml
            release/SHA256SUMS-linux.txt
