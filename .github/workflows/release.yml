name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  quality-gates:
    name: Quality gates
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify headless gates
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Renderer headless E2E
        run: pnpm exec playwright test --project=renderer

  build-mac:
    name: Build (macOS)
    needs: quality-gates
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Package (dmg)
        run: pnpm dist --mac

      - name: Generate checksums
        run: node scripts/generate-release-checksums.mjs --output "release/SHA256SUMS-macos.txt"

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/SHA256SUMS-macos.txt

  build-win:
    name: Build (Windows)
    needs: quality-gates
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Package (nsis)
        run: pnpm dist --win

      - name: Generate checksums
        run: node scripts/generate-release-checksums.mjs --output "release/SHA256SUMS-windows.txt"

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/SHA256SUMS-windows.txt

  build-linux:
    name: Build (Linux)
    needs: quality-gates
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify headless gates
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Renderer headless E2E
        run: pnpm exec playwright test --project=renderer

      - name: Build
        run: pnpm build

      - name: Package (AppImage)
        run: pnpm dist --linux

      - name: Generate checksums
        run: node scripts/generate-release-checksums.mjs --output release/SHA256SUMS-linux.txt

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.AppImage
            release/SHA256SUMS-linux.txt
